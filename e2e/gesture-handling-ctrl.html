<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GestureHandling E2E — ctrl modifier</title>
    <link rel="stylesheet" href="/node_modules/maplibre-gl/dist/maplibre-gl.css" />
    <style>
      html, body { height: 100%; margin: 0; }
      #map { width: 800px; height: 600px; }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script src="/node_modules/maplibre-gl/dist/maplibre-gl.js"></script>
    <script type="module">
      import { GestureHandling } from "/dist/index.js";

      try {
        const map = new maplibregl.Map({
          container: "map",
          style: "https://tile.openstreetmap.jp/styles/maptiler-basic-ja/style.json",
          center: [139.767125, 35.681236],
          zoom: 14,
        });

        const ctrl = new GestureHandling({ modifierKey: "ctrl" });
        map.addControl(ctrl);

        window.__e2e = { ok: true, map, ctrl };
      } catch (e) {
        window.__e2e = { ok: false, error: e instanceof Error ? e.message : String(e) };
      }
    </script>
  </body>
</html>
