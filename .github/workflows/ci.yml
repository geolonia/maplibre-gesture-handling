name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project: chromium
            engine: chromium
          - project: firefox
            engine: firefox
          - project: webkit
            engine: webkit
          - project: mobile-chrome
            engine: chromium
          - project: mobile-safari
            engine: webkit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps ${{ matrix.engine }}
      - run: xvfb-run npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  publish:
    needs: [lint, test, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@geolonia"
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
